image:
  repository: ghcr.io/sargeant/mailman-db-exporter
  tag: ""
  pullPolicy: IfNotPresent

database:
  host: ""
  port: "5432"
  name: "mailman"
  user: "mailman"
  password: ""
  # Reference an existing secret. When set, the inline fields above are ignored.
  existingSecret: ""
  # If the existing secret holds a full DSN under a single key (e.g. a CNPG
  # *-app secret with a "uri" key), name that key here. The DSN is wired to
  # MAILMAN_DB_DSN via secretKeyRef. When empty, the secret is consumed with
  # envFrom and must provide DB_HOST/DB_PORT/DB_NAME/DB_USER/DB_PASS keys.
  existingSecretDsnKey: ""

exporter:
  port: 9934
  logLevel: INFO
  # Named filtered member counts. Each entry emits
  # mailman_filtered_members_total{filter="<name>"}: distinct verified member
  # addresses on at least one list *other* than those excluded. An address only
  # on excluded lists is not counted.
  # e.g.
  # filteredMemberCounts:
  #   subscribers:
  #     - allowlist.example.com
  #     - surveys.example.com
  filteredMemberCounts: {}

serviceMonitor:
  enabled: false
  interval: 60s
  scrapeTimeout: 30s
  labels: {}
  # e.g. release: kube-prometheus-stack

service:
  port: 9934

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
